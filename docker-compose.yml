version: "3.9"

networks:
  taskflow-net:
    driver: bridge

services:

  # ── MySQL Database ──────────────────────────────
  mysql:
    image: mysql:8
    container_name: taskflow-mysql
    networks:
      - taskflow-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: auth_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Service ────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: taskflow-auth
    networks:
      - taskflow-net
    env_file:
      - .env
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./auth-service:/app

  # ── Task Service ────────────────────────────────
  task-service:
    build: ./task-service
    container_name: taskflow-task
    networks:
      - taskflow-net
    env_file:
      - .env
    ports:
      - "5002:5002"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./task-service:/app

  # ── Notification Service ────────────────────────
  notification-service:
    build: ./notification-service
    container_name: taskflow-notif
    networks:
      - taskflow-net
    env_file:
      - .env
    ports:
      - "5003:5003"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./notification-service:/app

  # ── API Gateway ─────────────────────────────────
  gateway:
    build: ./gateway
    container_name: taskflow-gateway
    networks:
      - taskflow-net
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - task-service
      - notification-service
    volumes:
      - ./gateway:/app

volumes:
  mysql_data: